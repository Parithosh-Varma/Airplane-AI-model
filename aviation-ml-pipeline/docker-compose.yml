version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aviation_pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: changeme_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d aviation_pipeline"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: unless-stopped

  scraper:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://pipeline:changeme_production@db:5432/aviation_pipeline
      - POLITENESS_DELAY_MIN=${POLITENESS_DELAY_MIN:-30}
      - POLITENESS_DELAY_MAX=${POLITENESS_DELAY_MAX:-120}
      - PROXY_ROTATION_URL=${PROXY_ROTATION_URL:-}
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - TORCH_DEVICE=cpu
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
